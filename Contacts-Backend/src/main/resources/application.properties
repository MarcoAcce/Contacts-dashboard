spring.application.name=contacts-backend
server.port=5000

# Import secrets (not committed to git)
spring.config.import=optional:file:./secrets.properties

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:contactsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Auth0 OAuth2 Resource Server (values provided by secrets.properties)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${AUTH0_DOMAIN}/
spring.security.oauth2.resourceserver.jwt.audiences=${AUTH0_AUDIENCE}

# CORS
app.cors.allowed-origins=http://localhost:4200
